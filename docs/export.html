<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>ASP Messina - Knowledge Base (Export PDF)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism.min.css">
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 40px;
      background: #fff;
    }

    /* Cover page */
    .cover-page {
      text-align: center;
      padding: 120px 20px 80px;
      page-break-after: always;
    }
    .cover-page h1 {
      font-size: 2.8em;
      color: #0D9373;
      margin-bottom: 10px;
    }
    .cover-page .subtitle {
      font-size: 1.4em;
      color: #666;
      margin-bottom: 40px;
    }
    .cover-page .meta {
      font-size: 0.95em;
      color: #888;
      margin-top: 60px;
    }

    /* TOC */
    .toc-page {
      page-break-after: always;
    }
    .toc-page h2 {
      color: #0D9373;
      border-bottom: 2px solid #0D9373;
      padding-bottom: 8px;
    }
    .toc-page ul {
      list-style: none;
      padding-left: 0;
    }
    .toc-page ul ul {
      padding-left: 24px;
    }
    .toc-page li {
      padding: 3px 0;
    }
    .toc-page a {
      color: #333;
      text-decoration: none;
    }
    .toc-page a:hover {
      color: #0D9373;
    }

    /* Section content */
    .section {
      page-break-before: always;
    }
    .section:first-of-type {
      page-break-before: auto;
    }

    h1 { color: #0D9373; font-size: 1.8em; border-bottom: 2px solid #0D9373; padding-bottom: 6px; margin-top: 0; }
    h2 { color: #0a7d62; font-size: 1.4em; margin-top: 1.5em; }
    h3 { color: #444; font-size: 1.15em; margin-top: 1.2em; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 0.88em;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 6px 10px;
      text-align: left;
    }
    th {
      background: #f0f7f5;
      font-weight: 600;
    }
    tr:nth-child(even) { background: #fafafa; }

    code {
      background: #f4f4f4;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 12px;
      overflow-x: auto;
      font-size: 0.85em;
    }
    pre code {
      background: none;
      padding: 0;
    }

    blockquote {
      border-left: 4px solid #0D9373;
      margin: 12px 0;
      padding: 8px 16px;
      color: #555;
      background: #f9fdfb;
    }

    img { max-width: 100%; }

    /* Toolbar */
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #0D9373;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .toolbar h3 { color: #fff; margin: 0; font-size: 1em; }
    .toolbar button {
      background: #fff;
      color: #0D9373;
      border: none;
      padding: 8px 20px;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95em;
    }
    .toolbar button:hover { background: #e0f5ee; }
    .toolbar button:disabled { opacity: 0.5; cursor: wait; }
    .toolbar .status { font-size: 0.85em; opacity: 0.9; }

    #content { margin-top: 60px; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #888;
      font-size: 1.1em;
    }
    .loading .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #ddd;
      border-top-color: #0D9373;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Print styles */
    @media print {
      .toolbar { display: none !important; }
      #content { margin-top: 0; }
      body { padding: 0 20px; font-size: 11pt; }
      .section { page-break-before: always; }
      .cover-page { page-break-after: always; }
      .toc-page { page-break-after: always; }
      table { font-size: 9pt; }
      pre { font-size: 8.5pt; white-space: pre-wrap; word-wrap: break-word; }
      a { color: #333 !important; text-decoration: none !important; }
      h1, h2, h3 { page-break-after: avoid; }
      table, pre, blockquote { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<div class="toolbar">
  <h3>ASP Messina - Knowledge Base</h3>
  <span class="status" id="status">Caricamento in corso...</span>
  <button id="printBtn" onclick="window.print()" disabled>Salva come PDF</button>
</div>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div>Caricamento documentazione...</div>
    <div id="progress" style="margin-top:10px; font-size:0.85em;"></div>
  </div>
</div>

<script>
  // Ordered list of all KB pages from sidebar
  const pages = [
    { file: 'README.md', title: 'Panoramica' },
    { file: 'architecture.md', title: 'Architettura' },
    { file: 'anagrafica/overview.md', title: 'Anagrafica - Panoramica' },
    { file: 'anagrafica/ricerca.md', title: 'Anagrafica - Ricerca assistiti' },
    { file: 'anagrafica/extra-data.md', title: 'Anagrafica - Extra Data' },
    { file: 'mpi/overview.md', title: 'MPI - Panoramica' },
    { file: 'mpi/workflow.md', title: 'MPI - Workflow e stati' },
    { file: 'mpi/applications.md', title: 'MPI - Applicazioni' },
    { file: 'mpi/extra-data.md', title: 'MPI - Extra Data' },
    { file: 'mpi/merge-unmerge.md', title: 'MPI - Merge e Unmerge' },
    { file: 'hl7/overview.md', title: 'HL7 - Panoramica' },
    { file: 'hl7/categorie.md', title: 'HL7 - Categorie' },
    { file: 'hl7/anagrafica-extra.md', title: 'HL7 - Anagrafica Extra' },
    { file: 'siad/overview.md', title: 'SIAD - Panoramica' },
    { file: 'siad/presa-in-carico.md', title: 'SIAD - Presa in Carico' },
    { file: 'siad/valutazione-sanitaria.md', title: 'SIAD - Valutazione Sanitaria' },
    { file: 'siad/valutazione-sociale.md', title: 'SIAD - Valutazione Sociale' },
    { file: 'auth/overview.md', title: 'Autenticazione - JWT e Permessi' },
    { file: 'auth/scopes.md', title: 'Autenticazione - Sistema Scope' },
    { file: 'auth/login-otp.md', title: 'Autenticazione - Login e OTP' },
    { file: 'admin/dashboard.md', title: 'Admin - Dashboard' },
    { file: 'admin/utenti.md', title: 'Admin - Gestione Utenti' },
    { file: 'admin/categorie.md', title: 'Admin - Gestione Categorie' },
    { file: 'forms/overview.md', title: 'Forms - Panoramica' },
    { file: 'apps/overview.md', title: 'Apps Docker - Panoramica' },
    { file: 'roadmap.md', title: 'Roadmap - Funzionalita Future' }
  ];

  // Configure marked
  marked.setOptions({
    gfm: true,
    breaks: false,
    highlight: function(code, lang) {
      if (Prism.languages[lang]) {
        return Prism.highlight(code, Prism.languages[lang], lang);
      }
      return code;
    }
  });

  async function loadAllPages() {
    const content = document.getElementById('content');
    const progress = document.getElementById('progress');
    const status = document.getElementById('status');
    const printBtn = document.getElementById('printBtn');

    const sections = [];
    let loaded = 0;

    for (const page of pages) {
      try {
        progress.textContent = `${loaded + 1}/${pages.length} - ${page.title}`;
        const resp = await fetch('/kb/' + page.file);
        if (resp.ok) {
          const md = await resp.text();
          sections.push({ title: page.title, html: marked.parse(md) });
        }
      } catch (e) {
        console.warn('Errore caricamento ' + page.file, e);
      }
      loaded++;
    }

    // Build final HTML
    let html = '';

    // Cover page
    const today = new Date().toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });
    html += `
      <div class="cover-page">
        <h1>ASP Messina<br>Web Services</h1>
        <div class="subtitle">Knowledge Base</div>
        <div class="subtitle" style="font-size:1em;">Documentazione tecnica completa</div>
        <div class="meta">
          <div>ASP5 Messina - SIA Area Progettazione e Sviluppo</div>
          <div>Ing. Roberto De Domenico</div>
          <div style="margin-top:20px;">Generato il ${today}</div>
        </div>
      </div>
    `;

    // TOC
    html += '<div class="toc-page">';
    html += '<h2>Indice</h2>';

    const groups = {};
    for (const s of sections) {
      const parts = s.title.split(' - ');
      const group = parts.length > 1 ? parts[0] : 'Introduzione';
      if (!groups[group]) groups[group] = [];
      groups[group].push(s.title);
    }
    html += '<ul>';
    for (const [group, items] of Object.entries(groups)) {
      html += `<li><strong>${group}</strong><ul>`;
      for (const item of items) {
        const anchor = item.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        html += `<li><a href="#${anchor}">${item}</a></li>`;
      }
      html += '</ul></li>';
    }
    html += '</ul></div>';

    // Sections
    for (const s of sections) {
      const anchor = s.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      html += `<div class="section" id="${anchor}">${s.html}</div>`;
    }

    // Footer
    html += `<div style="text-align:center; margin-top:40px; padding:20px 0; border-top:1px solid #ddd; color:#888; font-size:0.85em;">
      ASP5 Messina - SIA Area Progettazione e Sviluppo - Ing. Roberto De Domenico
    </div>`;

    content.innerHTML = html;
    status.textContent = `${sections.length} sezioni caricate`;
    printBtn.disabled = false;

    // Re-highlight code blocks
    Prism.highlightAll();
  }

  loadAllPages();
</script>

</body>
</html>
